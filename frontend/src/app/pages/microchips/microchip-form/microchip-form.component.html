<h1>Lisa mikrokiib</h1>

<div *ngIf="error" class="error-message">{{ error }}</div>

<div class="form-field">
  <label>Mikrokiibi number</label><br>
  <input [(ngModel)]="model.chipNumber" />
</div>

<div class="form-field">
  <label>Importija</label><br>
  <input [(ngModel)]="model.importer" />
</div>

<button (click)="save()">Salvesta</button>
