<h1>Search</h1>

<div class="search-box">
  <input
    [(ngModel)]="searchText"
    placeholder="Enter pet name or microchip"
  />

  <button (click)="search()">Search</button>
</div>

<div *ngIf="loading">
  Searching...
</div>

<div *ngIf="error">
  {{ error }}
</div>

<div class="results" *ngIf="pets.length">

  <h2>Pets</h2>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Species</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let pet of pets">
        <td>{{ pet.id }}</td>
        <td>{{ pet.name }}</td>
        <td>{{ pet.species }}</td>
        <td>{{ pet.status }}</td>

        <td>
          <a [routerLink]="['/pets', pet.id]">View</a>
        </td>
      </tr>
    </tbody>

  </table>

</div>

<div *ngIf="!pets.length && !loading">
  No results
</div>
