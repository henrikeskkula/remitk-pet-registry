<h1>Pet events</h1>

<div *ngIf="error" style="color: red;">{{ error }}</div>

<h2>Create event</h2>

<div>
  <label>Type</label><br>
  <select [(ngModel)]="model.type">
    <option value="MARKED_MISSING">MARKED_MISSING</option>
    <option value="MARKED_FOUND">MARKED_FOUND</option>
    <option value="TRANSFER_INITIATED">TRANSFER_INITIATED</option>
    <option value="TRANSFER_ACCEPTED">TRANSFER_ACCEPTED</option>
    <option value="TRANSFER_REJECTED">TRANSFER_REJECTED</option>
  </select>
</div>

<div>
  <label>Description</label><br>
  <input [(ngModel)]="model.description" />
</div>

<div>
  <label>Time</label><br>
  <input [(ngModel)]="model.time" placeholder="2025-11-13T14:28:39" />
</div>

<br>
<button (click)="createEvent()">Create event</button>

<hr>

<h2>Event list</h2>

<table *ngIf="events.length" border="1" cellpadding="8">
  <thead>
    <tr>
      <th>ID</th>
      <th>Type</th>
      <th>Time</th>
      <th>Role</th>
      <th>Description</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let event of events">
      <td>{{ event.id }}</td>
      <td>{{ event.eventType }}</td>
      <td>{{ event.eventTimestamp }}</td>
      <td>{{ event.performedByRole }}</td>
      <td>{{ event.description }}</td>
    </tr>
  </tbody>
</table>

<div *ngIf="!events.length">No events found.</div>
