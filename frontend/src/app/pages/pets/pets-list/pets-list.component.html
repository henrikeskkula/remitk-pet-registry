<h1>Pets</h1>

<a routerLink="/pets/new">Add new pet</a>

<div *ngIf="loading">
  Loading pets...
</div>

<div *ngIf="error">
  {{ error }}
</div>

<table *ngIf="pets.length">

  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Species</th>
      <th>Status</th>
      <th>Owner</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let pet of pets">

      <td>{{ pet.id }}</td>

      <td>
        {{ pet.name || 'Found animal' }}
      </td>

      <td>{{ pet.species }}</td>

      <td>{{ pet.status }}</td>

      <td>{{ pet.ownerId || '-' }}</td>

      <td>
        <a [routerLink]="['/pets', pet.id]">View</a>
      </td>

    </tr>
  </tbody>

</table>
