<h1>Pets</h1>

<div>
  <input [(ngModel)]="searchName" placeholder="Search by name" />
  <button (click)="searchPets()">Search</button>
  <a routerLink="/pets/new">Add pet</a>
</div>

<div *ngIf="loading">Loading...</div>
<div *ngIf="error">{{ error }}</div>

<table *ngIf="!loading && pets.length">
  <thead>
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Species</th>
      <th>Status</th>
      <th>Owner ID</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let pet of pets">
      <td>{{ pet.id }}</td>
      <td>{{ pet.name || 'Found animal' }}</td>
      <td>{{ pet.species }}</td>
      <td>{{ pet.status }}</td>
      <td>{{ pet.ownerId || '-' }}</td>
      <td>
        <a [routerLink]="['/pets', pet.id]">View</a>
      </td>
    </tr>
  </tbody>
</table>
