<h1>Loomad</h1>

<div>
  <input [(ngModel)]="searchName" placeholder="Otsi nime järgi" />
  <button [disabled]="loading" (click)="searchPets()">Otsi</button>
  <a routerLink="/pets/new">Lisa loom</a>
</div>

<div *ngIf="loading && !pets.length">Laadimine...</div>
<div *ngIf="error">{{ error }}</div>

<table *ngIf="pets.length">
  <thead>
    <tr>
      <th>ID</th>
      <th>Nimi</th>
      <th>Looma liik</th>
      <th>Staatus</th>
      <th>Loomapidaja ID</th>
      <th>Tegevus</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let pet of pets">
      <td>{{ pet.id }}</td>
      <td>{{ pet.name || 'Leitud loom' }}</td>
      <td>{{ petSpeciesLabel(pet.species) }}</td>
      <td>{{ petStatusLabel(pet.status) }}</td>
      <td>{{ pet.ownerId || '-' }}</td>
      <td>
        <a [routerLink]="['/pets', pet.id]">Vaata</a>
      </td>
    </tr>
  </tbody>
</table>
